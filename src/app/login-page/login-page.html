<div class="bg">
  <div class="bg-slides">
    <div
      class="bg-slide"
      *ngFor="let img of images; let i = index"
      [class.active]="currentIndex() === i"
      [class.prev]="prevIndex() === i && prevIndex() !== currentIndex()"
      [class.hidden]="currentIndex() !== i && (prevIndex() !== i || prevIndex() === currentIndex())"
      [style.background-image]="'url(' + img + ')'">
    </div>
  </div>

  <div class="shadow"></div>

  <nav class="navbar">
    <a class="navbar-brand">
      <img class="my-eicher-logo" src="/assets/logo.svg" alt="My Eicher logo" />
    </a>
  </nav>

  <div class="login-box">
    <div class="welcome">
      <h2>Welcome to My Eicher!</h2>
      <p>Your connected Fleet Management System</p>
    </div>
    <div class="dropdown">
      <select [(ngModel)]="selectedRole" (ngModelChange)="onChange($event)" name="role">
        <option value="Customer">Customers</option>
        <option value="Dealer">Dealer</option>
        <option value="VECV">VECV</option>
      </select>
    </div>

    <div class="role-fields">
      <div class="role-panel" [class.field-hidden]="selectedRole !== 'Customer'">
        <div class="mobile">
          <p>Login using your registered Mobile Number</p>
          <label for="phone">Mobile Number:</label>
          <div class="mobile-number">
            <span>+91</span>
            <input type="text" id="phone" placeholder="Enter your mobile number" />
          </div>
          <button class="proceed">Proceed</button>
        </div>
        <div class="divider">
          <span></span>
          <p>Don't have an account?</p>
          <span></span>
        </div>
        <button class="sign-upbtn">SIGN UP</button>
        <p class="sign-up">How to sign-up on My Eicher?</p>
      </div>

      <div class="role-panel" [class.field-hidden]="selectedRole !== 'Dealer'">
        <div class="userId">
          <label for="user">User ID</label>
          <div>
            <input type="text" id="user">
          </div>
        </div>
        <div class="password">
          <label for="pass">Password</label>
          <div>
            <input type="password" id="pass">
          </div>
        </div>
        <p class="forgotPassword">FORGOT PASSWORD</p>
        <button class="logIn">Log in →</button>
        <p class="needHelp">Need help?</p>
      </div>

      <div class="role-panel" [class.field-hidden]="selectedRole !== 'VECV'">
        <button class="continue">Continue →</button>
      </div>
    </div>
  </div>
</div>
