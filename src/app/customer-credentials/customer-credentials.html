<div class="bg">
  <div class="bg-slides">
    <div
      class="bg-slide"
      *ngFor="let img of images; let i = index"
      [class.active]="currentIndex() === i"
      [class.prev]="prevIndex() === i && prevIndex() !== currentIndex()"
      [class.hidden]="currentIndex() !== i && (prevIndex() !== i || prevIndex() === currentIndex())"
      [style.background-image]="'url(' + img + ')'">
    </div>
  </div>

  <div class="shadow"></div>

  <nav class="navbar">
    <a class="navbar-brand">
      <img class="my-eicher-logo" src="/assets/logo.svg" alt="My Eicher logo" />
    </a>
  </nav>

  <div class="login-box">
    <div class="welcome">
      <h2>Welcome to My Eicher!</h2>
      <p>Your connected Fleet Management System</p>
    </div>

    <div class="credentials">
      <p class="credentials-hint">Login for +91 {{ mobileNumber }}</p>

      <div class="userId">
        <label for="username">Username</label>
        <div>
          <input
            type="text"
            id="username"
            [(ngModel)]="username"
            placeholder="Enter your username" />
        </div>
      </div>

      <div class="password">
        <label for="customer-pass">Password</label>
        <div>
          <input
            type="password"
            id="customer-pass"
            [(ngModel)]="password"
            placeholder="Enter your password" />
        </div>
      </div>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="button" class="logIn" (click)="onLogin()">Log in →</button>
      <p class="needHelp" (click)="goBack()">Back to mobile login</p>
    </div>
  </div>
</div>
